<!DOCTYPE html>
<html>
<head>
  <title>Nigeria Sales System</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<div class="header">
  <h2>Nigeria Sales System</h2>
</div>

<!-- TABS -->
<div class="tabs">
  <button onclick="showTab('dashboard', this)">Dashboard</button>
  <button onclick="showTab('inward', this)" class="active">Inward Pcs</button>
  <button onclick="showTab('inventory', this)">Inventory</button>
  <button onclick="showTab('sales', this)">Sales Entry</button>
</div>

<!-- TAB CONTENTS -->

<!-- Dashboard -->
<div id="dashboard" class="tab-content">
  <h2 style="padding:20px;">Dashboard Content</h2>
</div>

<!-- Inward PCS -->
<div id="inward" class="tab-content active">

  <div class="container">

    <!-- LEFT FORM -->
 <div class="form-section">

  <h4>Inward Details</h4>

  <div class="form-grid">

    <input id="bale" placeholder="Bale No">
    <input id="name" placeholder="Fabric Name">
    <input id="quality" placeholder="Fabric Quality">
    <input id="design" placeholder="Design No">
    <input id="color" placeholder="Color">
    <input id="pcs" placeholder="PCS">
    <input id="qty" placeholder="Qty">
    <input id="uom" placeholder="UOM">

  </div>

  <div class="btn-group">
    <button class="btn" onclick="generatePCS()">Generate PCS</button>
    <button class="btn" onclick="saveData()">Save</button>
    <button class="btn" onclick="clearForm()">Clear</button>
  </div>

</div>

    <!-- RIGHT PCS TABLE -->
    <div class="pcs-section">

      <h4>Taka Details</h4>

      <table>
        <thead>
          <tr>
            <th>PCS No</th>
            <th>Yard</th>
            <th>Delete</th>
          </tr>
        </thead>

        <tbody>
        </tbody>
      </table>

    </div>

  </div>

</div>

<!-- Inventory -->
<div id="inventory" class="tab-content">
  <h2 style="padding:20px;">Inventory Content</h2>
</div>

<!-- Sales -->
<div id="sales" class="tab-content">
  <h2 style="padding:20px;">Sales Entry Content</h2>
</div>

<!-- JS -->
<script src="script.js" defer></script>

</body>
</html>
