<!DOCTYPE html>
<html>
<head>
  <title>Nigeria Sales System</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<div class="header">
  <h1>Nigeria Sales System</h1>
</div>

<!-- TABS -->
<div class="tabs">
  <button onclick="showTab('dashboard', this)">Dashboard</button>
  <button onclick="showTab('inward', this)" class="active">Inward PCS</button>
  <button onclick="showTab('inventory', this)">Inventory</button>
  <button onclick="showTab('sales', this)">Sales Entry</button>
</div>

<!-- TAB CONTENTS -->

<!-- Dashboard -->
<div id="dashboard" class="tab-content">
  <h2 style="padding:20px;">Dashboard Content</h2>
</div>

<!-- Inward PCS -->
<div id="inward" class="tab-content active">

  <div class="container">

    <!-- LEFT FORM -->
    <div class="form-section">

      <h3>Inward Details</h3>

      <input placeholder="Party Name">
      <input placeholder="Quality">
      <input placeholder="Lot No">
      <input placeholder="Design No">
      <input placeholder="Color">
      <input placeholder="Rate">

      <button class="btn">Save</button>

    </div>

    <!-- RIGHT PCS TABLE -->
    <div class="pcs-section">

      <h3>Taka Details</h3>

      <table>
        <thead>
          <tr>
            <th>PCS No</th>
            <th>Yard</th>
            <th>Delete</th>
          </tr>
        </thead>

        <tbody>
          <tr><td>1</td><td>115</td><td>X</td></tr>
          <tr><td>2</td><td>114</td><td>X</td></tr>
          <tr><td>3</td><td>115</td><td>X</td></tr>
          <tr><td>4</td><td>82</td><td>X</td></tr>
        </tbody>
      </table>

    </div>

  </div>

</div>

<!-- Inventory -->
<div id="inventory" class="tab-content">
  <h2 style="padding:20px;">Inventory Content</h2>
</div>

<!-- Sales -->
<div id="sales" class="tab-content">
  <h2 style="padding:20px;">Sales Entry Content</h2>
</div>

<!-- JS -->
<script src="script.js" defer></script>

</body>
</html>
